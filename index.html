<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COSMIC SCORE</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a14;
      --surface:   #12121f;
      --surface2:  #1a1a2e;
      --border:    #2a2a45;
      --accent:    #7c5cfc;
      --accent2:   #c084fc;
      --note:      #a78bfa;
      --note-sel:  #f0abfc;
      --text:      #e2e8f0;
      --text-muted:#7c85a0;
      --piano-w:   #f1f5f9;
      --piano-b:   #1e1b2e;
      --danger:    #f87171;
      --success:   #34d399;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* ===== Header ===== */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .12em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    .version-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 20px;
    }

    .header-sep { flex: 1; }

    .song-name-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
      width: 180px;
    }
    .song-name-input:focus { outline: none; border-color: var(--accent); }

    /* ===== Toolbar ===== */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
      -webkit-user-select: none;
      user-select: none;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--accent); border-color: var(--accent); }
    .btn.primary:hover { filter: brightness(1.15); }
    .btn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
    .btn.danger:hover { filter: brightness(1.15); }
    .btn.active { background: var(--accent); border-color: var(--accent); }

    .sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

    label.lbl { font-size: 11px; color: var(--text-muted); }

    select.ctrl, input[type=number].ctrl, input[type=range].ctrl {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 12px;
    }
    select.ctrl:focus, input.ctrl:focus { outline: none; border-color: var(--accent); }
    input[type=range].ctrl { padding: 0; width: 80px; accent-color: var(--accent); }

    /* ===== Main Layout ===== */
    main {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 1fr;
      overflow: hidden;
    }

    /* ===== Track List ===== */
    #track-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #track-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #track-list::-webkit-scrollbar { width: 4px; }
    #track-list::-webkit-scrollbar-track { background: transparent; }
    #track-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .track-item {
      padding: 6px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 3px solid transparent;
      transition: background .1s;
      position: relative;
    }
    .track-item:hover { background: var(--surface2); }
    .track-item.active { background: var(--surface2); border-left-color: var(--accent); }

    .track-color {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .track-name {
      flex: 1;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .track-mute, .track-solo {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background .1s;
    }
    .track-mute:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
    .track-solo:hover { background: var(--success); color: #0a0a14; border-color: var(--success); }
    .track-mute.muted { background: var(--danger); color: #fff; border-color: var(--danger); }
    .track-solo.soloed { background: var(--success); color: #0a0a14; border-color: var(--success); }

    /* ===== Piano Roll Area ===== */
    #editor-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #canvas-wrap {
      flex: 1;
      overflow: auto;
      position: relative;
      background: var(--bg);
    }
    #canvas-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
    #canvas-wrap::-webkit-scrollbar-track { background: var(--surface); }
    #canvas-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #roll-canvas {
      display: block;
      cursor: crosshair;
    }

    /* ===== AI Panel ===== */
    #ai-panel {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .ai-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #ai-prompt {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      resize: none;
    }
    #ai-prompt:focus { outline: none; border-color: var(--accent); }
    #ai-prompt::placeholder { color: var(--text-muted); }

    #song-title-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    #song-title-input:focus { outline: none; border-color: var(--accent); }
    #song-title-input::placeholder { color: var(--text-muted); }

    .mood-btns { display: flex; gap: 6px; }
    .mood-btn {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      transition: background .15s;
    }
    .mood-btn:hover, .mood-btn.active { background: var(--accent); border-color: var(--accent); }

    /* ===== API Key Modal ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 420px;
      max-width: 90vw;
    }
    .modal h2 { font-size: 16px; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
    .modal input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .modal input:focus { outline: none; border-color: var(--accent); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

    /* ===== Status bar ===== */
    #status-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 3px 16px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
      grid-column: 1 / -1;
      flex-shrink: 0;
    }

    .status-version { margin-left: auto; }

    /* ===== Toast ===== */
    #toast {
      position: fixed;
      bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      z-index: 2000;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Scrollbar — webkit (Chrome/Safari) */
    #track-list::-webkit-scrollbar,
    #canvas-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    #track-list::-webkit-scrollbar-track { background: transparent; }
    #canvas-wrap::-webkit-scrollbar-track { background: var(--surface); }
    #track-list::-webkit-scrollbar-thumb,
    #canvas-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Inline-style replacements */
    .btn-sm   { padding: 2px 8px; font-size: 11px; }
    .ai-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .bpm-input { width: 56px; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <span class="logo">✦ COSMIC SCORE</span>
  <span class="version-badge">v1.1.0</span>
  <input class="song-name-input" id="song-name" type="text" value="Untitled Song" title="曲名" placeholder="曲名" />
  <div class="header-sep"></div>
  <button class="btn" id="btn-load">読み込み</button>
  <button class="btn primary" id="btn-save">保存</button>
  <button class="btn" id="btn-apikey">🔑 API Key</button>
</header>

<!-- Main -->
<main>

  <!-- Track Panel -->
  <div id="track-panel">
    <div class="panel-header">
      TRACKS
      <button class="btn btn-sm" id="btn-add-track" title="トラックを追加">＋</button>
    </div>
    <div id="track-list"></div>
  </div>

  <!-- Editor Panel -->
  <div id="editor-panel">

    <!-- Toolbar -->
    <div class="toolbar">
      <!-- Transport -->
      <button class="btn primary" id="btn-play">▶ Play</button>
      <button class="btn" id="btn-stop">■ Stop</button>
      <div class="sep"></div>
      <!-- Tools -->
      <button class="btn active" id="tool-draw" title="描画 (1)">✏</button>
      <button class="btn" id="tool-select" title="選択 (2)">⬚</button>
      <button class="btn" id="tool-erase" title="消去 (3)">✕</button>
      <div class="sep"></div>
      <!-- BPM -->
      <label class="lbl">BPM</label>
      <input class="ctrl bpm-input" id="bpm" type="number" value="120" min="40" max="300" step="1" title="BPM" placeholder="BPM" />
      <!-- Quantize -->
      <label class="lbl">量子化</label>
      <select class="ctrl" id="quantize" title="量子化">>
        <option value="1">1小節</option>
        <option value="0.5">1/2</option>
        <option value="0.25" selected>1/4</option>
        <option value="0.125">1/8</option>
        <option value="0.0625">1/16</option>
      </select>
      <!-- Volume -->
      <div class="sep"></div>
      <label class="lbl">音量</label>
      <input class="ctrl" id="master-vol" type="range" min="0" max="1" step="0.01" value="0.8" title="マスター音量" />
      <div class="sep"></div>
      <button class="btn danger" id="btn-clear-notes">クリア</button>
    </div>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <canvas id="roll-canvas"></canvas>
    </div>

    <!-- AI Panel -->
    <div id="ai-panel">
      <!-- Row 1: ゼロ生成 / アレンジ -->
      <div class="ai-row">
        <span class="ai-label">✨ AI</span>
        <div class="mood-btns">
          <button class="mood-btn" data-mood="bright">明るい</button>
          <button class="mood-btn" data-mood="dark">暗い</button>
          <button class="mood-btn" data-mood="calm">落ち着く</button>
          <button class="mood-btn" data-mood="epic">壮大</button>
        </div>
        <input id="ai-prompt" placeholder="例: このメロディの続きを作って、ハモリを追加して" />
        <button class="btn primary" id="btn-ai-gen">生成</button>
        <button class="btn" id="btn-ai-arrange">アレンジ</button>
      </div>
      <!-- Row 2: 曲名から生成 -->
      <div class="ai-row">
        <span class="ai-label">🎵 曲名</span>
        <input id="song-title-input" placeholder="例: モーツアルト あわそのピアノソナタ第15番, Bach Minuet in G ..." title="曲名を入力" />
        <select class="ctrl" id="song-title-bars" title="生成小節数">
          <option value="4">4小節</option>
          <option value="8" selected>8小節</option>
          <option value="16">16小節</option>
        </select>
        <button class="btn primary" id="btn-ai-from-title">🎵 曲名から生成</button>
      </div>
    </div>
  </div>
</main>

<!-- Status bar (outside main grid) -->
<div id="status-bar">
  <span id="status-pos">位置: 1:1:0</span>
  <span id="status-notes">ノート数: 0</span>
  <span id="status-info">ツール: 描画</span>
  <span class="status-version">COSMIC SCORE v1.1.0</span>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- API Key Modal -->
<div class="modal-overlay hidden" id="modal-apikey">
  <div class="modal">
    <h2>🔑 Gemini API Key</h2>
    <p>Google AI Studio でAPIキーを取得してください。<br>
      キーはブラウザのLocalStorageにのみ保存されます。</p>
    <input type="password" id="apikey-input" placeholder="AIza..." />
    <div class="modal-btns">
      <button class="btn" id="btn-apikey-cancel">キャンセル</button>
      <button class="btn primary" id="btn-apikey-save">保存</button>
    </div>
  </div>
</div>

<script type="module" src="storage.js"></script>
<script type="module" src="engine.js"></script>
<script type="module" src="editor.js"></script>
<script type="module" src="ai.js"></script>
</body>
</html>
