<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background (cosmic dark + rounded) -->
  <rect width="512" height="512" rx="80" fill="#0a0a14"/>

  <!--
    Conductor Robot Pixel Art
    Grid: 16×16 cells, each cell = 32px
    Col n → x = n*32 | Row n → y = n*32
  -->

  <!-- ── ANTENNA ── -->
  <!-- rows 0-1, col 7 -->
  <rect x="224" y="0"   width="32"  height="64"  fill="#7c5cfc"/>
  <!-- row 2, cols 6-8 -->
  <rect x="192" y="64"  width="96"  height="32"  fill="#7c5cfc"/>

  <!-- ── HEAD ── -->
  <!-- top bar: row 3, cols 5-10 -->
  <rect x="160" y="96"  width="192" height="32"  fill="#b0b8c8"/>
  <!-- left ear: rows 4-7, col 4 -->
  <rect x="128" y="128" width="32"  height="128" fill="#b0b8c8"/>
  <!-- right ear: rows 4-7, col 11 -->
  <rect x="352" y="128" width="32"  height="128" fill="#b0b8c8"/>
  <!-- face interior: rows 4-7, cols 5-10 -->
  <rect x="160" y="128" width="192" height="128" fill="#9ca3af"/>

  <!-- LEFT EYE: row 5 (y=160), cols 6-7 -->
  <rect x="192" y="160" width="64"  height="32"  fill="#7c5cfc"/>
  <rect x="198" y="164" width="20"  height="12"  fill="#c084fc"/>

  <!-- RIGHT EYE: row 5 (y=160), cols 9-10 -->
  <rect x="288" y="160" width="64"  height="32"  fill="#7c5cfc"/>
  <rect x="294" y="164" width="20"  height="12"  fill="#c084fc"/>

  <!-- MOUTH GRILL: row 7 (y=224), cols 5-9 -->
  <rect x="160" y="224" width="160" height="32"  fill="#4ade80"/>
  <!-- grill bars -->
  <rect x="181" y="228" width="10"  height="22"  fill="#0a1a0a"/>
  <rect x="204" y="228" width="10"  height="22"  fill="#0a1a0a"/>
  <rect x="227" y="228" width="10"  height="22"  fill="#0a1a0a"/>
  <rect x="250" y="228" width="10"  height="22"  fill="#0a1a0a"/>
  <rect x="273" y="228" width="10"  height="22"  fill="#0a1a0a"/>
  <rect x="296" y="228" width="10"  height="22"  fill="#0a1a0a"/>

  <!-- ── COLLAR: row 8 (y=256) ── -->
  <!-- tuxedo sides -->
  <rect x="160" y="256" width="64"  height="32"  fill="#1a1a2e"/>
  <rect x="288" y="256" width="64"  height="32"  fill="#1a1a2e"/>
  <!-- white shirt center -->
  <rect x="224" y="256" width="64"  height="32"  fill="#f1f5f9"/>
  <!-- bow tie -->
  <rect x="224" y="262" width="24"  height="16"  fill="#7c5cfc"/>
  <rect x="264" y="262" width="24"  height="16"  fill="#7c5cfc"/>
  <rect x="247" y="257" width="18"  height="26"  fill="#c084fc"/>

  <!-- ── BODY: rows 9-12 ── -->
  <!-- main body cols 4-11 -->
  <rect x="128" y="288" width="256" height="128" fill="#1a1a2e"/>
  <!-- row 11 side extensions (cols 3 and 12) -->
  <rect x="384" y="352" width="32"  height="32"  fill="#1a1a2e"/>

  <!-- ── BATON (gold diagonal): rows 9→11, cols 1→3 ── -->
  <!-- sparkle above tip -->
  <rect x="36"  y="276" width="24"  height="12"  fill="#fde68a"/>
  <!-- baton pixels -->
  <rect x="32"  y="288" width="32"  height="32"  fill="#f59e0b"/>
  <rect x="64"  y="320" width="32"  height="32"  fill="#f59e0b"/>
  <!-- col 3 row 11: overlaps body extension, drawn on top -->
  <rect x="96"  y="352" width="32"  height="32"  fill="#f59e0b"/>

  <!-- ── LEGS: row 13 (y=416) ── -->
  <rect x="128" y="416" width="64"  height="32"  fill="#1a1a2e"/>
  <rect x="320" y="416" width="64"  height="32"  fill="#1a1a2e"/>

  <!-- ── SHINS: row 14 (y=448) ── -->
  <rect x="128" y="448" width="64"  height="32"  fill="#b0b8c8"/>
  <rect x="320" y="448" width="64"  height="32"  fill="#b0b8c8"/>

  <!-- ── FEET: row 15 (y=480) ── -->
  <rect x="96"  y="480" width="32"  height="32"  fill="#b0b8c8"/>
  <rect x="128" y="480" width="64"  height="32"  fill="#6b7280"/>
  <rect x="320" y="480" width="64"  height="32"  fill="#6b7280"/>
  <rect x="384" y="480" width="32"  height="32"  fill="#b0b8c8"/>
</svg>
